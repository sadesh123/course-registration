<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian University — Course Registration</title>
<style>
  :root {
    color-scheme: light dark;
    --brand: #265bff;
    --brand-dark: #1a44cc;
    --bg: #ffffff;
    --surface: #ffffff;
    --nav-bg: #ffffff;
    --text: #14161f;
    --muted: #6b7280;
    --border: #e7e9f0;
    --row-hover: #f7f9ff;
    --open-bg: #e6f6ec;
    --open-text: #1e8e4a;
    --closed-bg: #fdeaea;
    --closed-text: #d23c3c;
    --shadow: 0 1px 2px rgba(20,22,31,0.04), 0 8px 24px rgba(20,22,31,0.06);
    --avatar-bg: #eef1ff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117;
      --surface: #171a23;
      --nav-bg: #12141b;
      --text: #f2f3f7;
      --muted: #9aa0ad;
      --border: #262a36;
      --row-hover: #1b1f2b;
      --open-bg: rgba(30,142,74,0.18);
      --open-text: #4fd087;
      --closed-bg: rgba(210,60,60,0.18);
      --closed-text: #ff7373;
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
      --avatar-bg: #232838;
    }
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    margin: 0;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Nav bar ---- */
  nav {
    background: var(--nav-bg);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .nav-logo img {
    height: 20px;
    width: auto;
    display: block;
  }

  .nav-links {
    display: flex;
    gap: 4px;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .nav-links li a {
    display: inline-block;
    padding: 10px 14px;
    border-radius: 8px;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
    transition: background-color 0.15s ease, color 0.15s ease;
  }

  .nav-links li a:hover {
    background: var(--row-hover);
    color: var(--text);
  }

  .nav-links li a.active {
    color: var(--brand);
    background: rgba(38,91,255,0.1);
    font-weight: 600;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .demo-pill {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--brand);
    background: rgba(38,91,255,0.1);
    border: 1px solid rgba(38,91,255,0.25);
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--avatar-bg);
    color: var(--brand);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
  }

  /* ---- Page content ---- */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  .breadcrumb {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .breadcrumb span {
    color: var(--text);
    font-weight: 600;
  }

  .hero {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .hero h1 {
    margin: 0 0 4px;
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .hero p {
    margin: 0;
    color: var(--muted);
    font-size: 0.92rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  tbody td {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem;
  }

  tbody tr:last-child td {
    border-bottom: none;
  }

  tbody tr {
    transition: background-color 0.15s ease;
  }

  tbody tr:hover {
    background: var(--row-hover);
  }

  .course-code {
    display: inline-block;
    font-weight: 600;
    color: var(--brand);
    margin-right: 6px;
  }

  .seats {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }

  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 700;
  }

  .badge.open {
    background: var(--open-bg);
    color: var(--open-text);
  }

  .badge.closed {
    background: var(--closed-bg);
    color: var(--closed-text);
  }

  .waitlist {
    color: var(--muted);
    font-size: 0.9rem;
  }

  footer {
    margin-top: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--muted);
    flex-wrap: wrap;
    gap: 8px;
  }

  footer .powered {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  footer img {
    height: 12px;
    width: auto;
    opacity: 0.75;
  }

  @media (max-width: 640px) {
    .nav-links { display: none; }
  }
</style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <div class="nav-logo"><img src="idira-logo.png" alt="Idira"></div>
      <ul class="nav-links">
        <li><a href="#">Dashboard</a></li>
        <li><a href="#" class="active">Course Registration</a></li>
        <li><a href="#">Grades</a></li>
        <li><a href="#">Financial Aid</a></li>
        <li><a href="#">Profile</a></li>
      </ul>
    </div>
    <div class="nav-right">
      <span class="demo-pill">Demo by Idira</span>
      <div class="avatar">MU</div>
    </div>
  </nav>

  <main>
    <div class="breadcrumb">Portal / <span>Course Registration</span></div>

    <div class="hero">
      <div>
        <h1>Meridian University — Course Registration</h1>
        <p id="semester">Loading semester…</p>
      </div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Course</th>
            <th>Seats</th>
            <th>Status</th>
            <th>Waitlist</th>
          </tr>
        </thead>
        <tbody id="course-rows">
          <tr><td colspan="4">Loading courses…</td></tr>
        </tbody>
      </table>
    </div>

    <footer>
      <span id="last-updated"></span>
      <span class="powered">Powered by CyberArk Secrets Manager &amp; <img src="idira-logo.png" alt="Idira"></span>
    </footer>
  </main>

<script>
  fetch("courses.json")
    .then(function (res) { return res.json(); })
    .then(function (data) {
      document.getElementById("semester").textContent = data.semester;

      var rows = data.courses.map(function (course) {
        var isOpen = course.status === "Open";
        var badgeClass = isOpen ? "open" : "closed";
        var waitlist = course.waitlist > 0
          ? course.waitlist + " students"
          : "—";
        return (
          "<tr>" +
          "<td><span class=\"course-code\">" + course.code + "</span>" + course.name + "</td>" +
          "<td class=\"seats\">" + course.seats + "</td>" +
          "<td><span class=\"badge " + badgeClass + "\">" + course.status + "</span></td>" +
          "<td class=\"waitlist\">" + waitlist + "</td>" +
          "</tr>"
        );
      });

      document.getElementById("course-rows").innerHTML = rows.join("");

      var updated = new Date(data.lastUpdated);
      document.getElementById("last-updated").textContent =
        "Last updated: " + updated.toLocaleString();
    })
    .catch(function (err) {
      document.getElementById("course-rows").innerHTML =
        "<tr><td colspan=\"4\">Failed to load course data.</td></tr>";
      console.error(err);
    });
</script>
</body>
</html>
